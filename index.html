<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azadi Ka Tic-Tac-Toe</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        h1 {
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 10px;
            justify-content: center;
            margin: 20px auto;
        }
        .cell {
            width: 100px;
            height: 100px;
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .cell:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }
        .status {
            font-size: 1.2em;
            margin: 20px 0;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }
        .reset {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 10px 30px;
            font-size: 1.1em;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .reset:hover {
            background: #ff5252;
            transform: scale(1.05);
        }
        @media (max-width: 400px) {
            .board { grid-template-columns: repeat(3, 80px); gap: 8px; }
            .cell { width: 80px; height: 80px; font-size: 2.5em; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>✨ Tic-Tac-Toe ✨</h1>
    <div class="board" id="board">
        <!-- 9 cells will be generated by JavaScript -->
    </div>
    <div class="status" id="status">Player X ka turn hai</div>
    <button class="reset" id="reset">Game Restart</button>
</div>

<script>
    const boardElement = document.getElementById('board');
    const statusElement = document.getElementById('status');
    const resetButton = document.getElementById('reset');
    
    let board = ['', '', '', '', '', '', '', '', ''];
    let currentPlayer = 'X';
    let gameActive = true;
    
    const winPatterns = [
        [0,1,2], [3,4,5], [6,7,8], // rows
        [0,3,6], [1,4,7], [2,5,8], // columns
        [0,4,8], [2,4,6] // diagonals
    ];
    
    function createBoard() {
        boardElement.innerHTML = '';
        for(let i = 0; i < 9; i++) {
            const cell = document.createElement('div');
            cell.classList.add('cell');
            cell.setAttribute('data-index', i);
            cell.textContent = board[i];
            cell.addEventListener('click', () => handleCellClick(i));
            boardElement.appendChild(cell);
        }
    }
    
    function handleCellClick(index) {
        if(board[index] !== '' || !gameActive) return;
        
        board[index] = currentPlayer;
        updateBoard();
        
        if(checkWinner()) {
            statusElement.textContent = `🎉 Player ${currentPlayer} jeet gaya! 🎉`;
            gameActive = false;
            return;
        }
        
        if(isBoardFull()) {
            statusElement.textContent = "🤝 Match draw ho gaya! 🤝";
            gameActive = false;
            return;
        }
        
        currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        statusElement.textContent = `Player ${currentPlayer} ka turn hai`;
    }
    
    function checkWinner() {
        for(let pattern of winPatterns) {
            const [a,b,c] = pattern;
            if(board[a] && board[a] === board[b] && board[a] === board[c]) {
                return true;
            }
        }
        return false;
    }
    
    function isBoardFull() {
        return board.every(cell => cell !== '');
    }
    
    function updateBoard() {
        const cells = document.querySelectorAll('.cell');
        cells.forEach((cell, index) => {
            cell.textContent = board[index];
        });
    }
    
    function resetGame() {
        board = ['', '', '', '', '', '', '', '', ''];
        currentPlayer = 'X';
        gameActive = true;
        statusElement.textContent = "Player X ka turn hai";
        updateBoard();
    }
    
    createBoard();
    resetButton.addEventListener('click', resetGame);
</script>
</body>
</html>
